name: Validate Publish

on:
    workflow_dispatch:
        inputs:
            version:
                description: Release version to stage
                required: true
                type: string
                default: 0.1.0-rc.1

permissions:
    contents: read

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org
            - run: npm install --global npm@latest
            - run: bun install --frozen-lockfile
            - run: bun run build:packages --version "${{ inputs.version }}"
            - run: bun run build:binaries --version "${{ inputs.version }}"
            - run: bun run release:prepare --version "${{ inputs.version }}"
            - run: bun run release:validate --version "${{ inputs.version }}"
            - run: bun run release:publish --version "${{ inputs.version }}" --tag rc --dry-run
