name: Release

on:
    push:
        tags: ['v*']
    workflow_dispatch:
        inputs:
            version:
                description: Existing release version to publish or resume
                required: true
                type: string
            tag:
                description: npm dist-tag
                required: true
                default: rc
                type: string
            skip:
                description: Comma-separated package names already published
                required: false
                default: ''
                type: string

permissions:
    contents: write
    id-token: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org
            - run: npm install --global npm@latest
            - name: Derive release version
              id: release
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                      bun run release:tag-info --version "$MANUAL_VERSION" --tag "$MANUAL_TAG"
                  else
                      bun run release:tag-info
                  fi
              env:
                  MANUAL_VERSION: ${{ inputs.version }}
                  MANUAL_TAG: ${{ inputs.tag }}
            - run: bun install --frozen-lockfile
            - run: bun run format:check
            - run: bun run lint
            - run: bun run typecheck
            - run: bun run test
            - run: bun run build:packages --version "${{ steps.release.outputs.version }}"
            - run: bun run build:binaries --version "${{ steps.release.outputs.version }}"
            - run: bun run release:prepare --version "${{ steps.release.outputs.version }}"
            - run: bun run release:validate --version "${{ steps.release.outputs.version }}"
            - name: Publish packages sequentially
              run: bun run release:publish --version "${{ steps.release.outputs.version }}" --tag "${{ steps.release.outputs.tag }}" --skip "$SKIP_PACKAGES"
              env:
                  SKIP_PACKAGES: ${{ inputs.skip }}
            - name: Create GitHub release
              if: github.event_name == 'push'
              run: gh release create "$GITHUB_REF_NAME" --generate-notes
              env:
                  GH_TOKEN: ${{ github.token }}
